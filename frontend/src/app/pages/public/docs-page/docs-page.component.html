<div class="min-h-screen bg-gray-50 dark:bg-gray-950 pt-16">

    <!-- ── HERO ─────────────────────────────────────── -->
    <div class="bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-800">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-14">
            <div class="flex items-center gap-2 text-sm text-gray-400 dark:text-gray-500 mb-6">
                <a routerLink="/" class="hover:text-brand-600 dark:hover:text-brand-400 transition-colors font-medium">Home</a>
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
                </svg>
                <span class="text-gray-700 dark:text-gray-300 font-semibold">Documentation</span>
            </div>
            <div class="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-6">
                <div>
                    <div class="inline-flex items-center gap-2 px-3 py-1.5 bg-brand-50 dark:bg-brand-900/30 border border-brand-200 dark:border-brand-800 rounded-full mb-4">
                        <span class="w-1.5 h-1.5 rounded-full bg-brand-500 animate-pulse"></span>
                        <span class="text-xs font-semibold text-brand-700 dark:text-brand-300 tracking-wide">Documentation technique · Jury</span>
                    </div>
                    <h1 class="text-3xl sm:text-4xl font-bold text-gray-900 dark:text-white leading-tight">Shopticus — Docs</h1>
                    <p class="mt-2 text-gray-500 dark:text-gray-400 text-base max-w-xl">
                        Architecture complète, schéma MongoDB, rôles, routes Angular et flux d'authentification.
                    </p>
                </div>
                <div class="flex items-center gap-5 flex-shrink-0">
                    <div class="text-center">
                        <p class="text-2xl font-bold text-gray-900 dark:text-white">20</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Collections</p>
                    </div>
                    <div class="w-px h-10 bg-gray-200 dark:bg-gray-700"></div>
                    <div class="text-center">
                        <p class="text-2xl font-bold text-gray-900 dark:text-white">4</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Rôles</p>
                    </div>
                    <div class="w-px h-10 bg-gray-200 dark:bg-gray-700"></div>
                    <div class="text-center">
                        <p class="text-2xl font-bold text-gray-900 dark:text-white">MEAN</p>
                        <p class="text-xs text-gray-500 dark:text-gray-400">Stack</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── BODY ─────────────────────────────────────── -->
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex gap-10 relative">

            <!-- ── SIDEBAR DESKTOP ───────────────────── -->
            <aside class="hidden lg:block w-60 flex-shrink-0">
                <div class="sticky top-24 space-y-1">
                    <p class="text-xs font-bold text-gray-400 dark:text-gray-600 uppercase tracking-widest mb-3 px-3">Sections</p>
                    <button *ngFor="let s of sections"
                            type="button"
                            (click)="scrollTo(s.id)"
                            class="w-full flex items-center gap-3 px-3 py-3 rounded-xl text-left transition-all duration-200 border"
                            [ngClass]="activeSection === s.id
                                ? 'bg-brand-50 dark:bg-brand-900/20 border-brand-200 dark:border-brand-800'
                                : 'border-transparent hover:bg-gray-100 dark:hover:bg-gray-800/60'">
                        <div class="w-1 h-8 rounded-full flex-shrink-0 transition-all duration-200"
                             [ngClass]="activeSection === s.id ? 'bg-gradient-to-b from-brand-400 to-brand-600' : 'bg-gray-200 dark:bg-gray-700'">
                        </div>
                        <div class="min-w-0">
                            <div class="flex items-center gap-2">
                                <span class="text-base leading-none">{{ s.icon }}</span>
                                <span class="text-sm font-semibold truncate"
                                      [ngClass]="activeSection === s.id ? 'text-brand-600 dark:text-brand-400' : 'text-gray-700 dark:text-gray-300'">
                                    {{ s.label }}
                                </span>
                            </div>
                            <p class="text-xs text-gray-400 dark:text-gray-500 mt-0.5 truncate pl-6">{{ s.sublabel }}</p>
                        </div>
                    </button>
                    <div class="pt-4 mt-4 border-t border-gray-200 dark:border-gray-800 px-3">
                        <div class="text-xs text-gray-400 dark:text-gray-600 space-y-1">
                            <p class="font-semibold">Shopticus v1.0</p>
                            <p>Angular 21 · Node.js · MongoDB</p>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- ── MOBILE NAV PILL ───────────────────── -->
            <div class="mobile-nav-wrapper lg:hidden fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
                <div *ngIf="!mobileNavOpen"
                     (click)="mobileNavOpen = true"
                     class="flex items-center gap-2 px-4 py-3 bg-gray-900 dark:bg-white rounded-2xl shadow-2xl cursor-pointer border border-white/10 dark:border-gray-200">
                    <svg class="w-4 h-4 text-white dark:text-gray-900" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h7"/>
                    </svg>
                    <span class="text-sm font-semibold text-white dark:text-gray-900">
                        {{ activeSectionLabel }}
                    </span>
                    <svg class="w-3.5 h-3.5 text-gray-400 dark:text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                </div>
                <div *ngIf="mobileNavOpen"
                     class="bg-white dark:bg-gray-900 rounded-2xl shadow-2xl border border-gray-200 dark:border-gray-700 p-2 w-64">
                    <button *ngFor="let s of sections"
                            type="button"
                            (click)="scrollTo(s.id)"
                            class="w-full flex items-center gap-3 px-3 py-2.5 rounded-xl text-left transition-all duration-150"
                            [ngClass]="activeSection === s.id
                                ? 'bg-brand-50 dark:bg-brand-900/20 text-brand-600 dark:text-brand-400'
                                : 'hover:bg-gray-50 dark:hover:bg-gray-800 text-gray-700 dark:text-gray-300'">
                        <span class="text-base">{{ s.icon }}</span>
                        <div>
                            <p class="text-sm font-semibold">{{ s.label }}</p>
                            <p class="text-xs text-gray-400 dark:text-gray-500">{{ s.sublabel }}</p>
                        </div>
                    </button>
                </div>
            </div>

            <!-- ── CONTENU ───────────────────────────── -->
            <main class="flex-1 min-w-0 space-y-16 pb-32">
                <section id="overview"><app-docs-overview></app-docs-overview></section>
                <div class="h-px bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-800 to-transparent"></div>
                <section id="roles"><app-docs-roles></app-docs-roles></section>
                <div class="h-px bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-800 to-transparent"></div>
                <section id="routes"><app-docs-routes></app-docs-routes></section>
                <div class="h-px bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-800 to-transparent"></div>
                <section id="mongodb"><app-docs-mongodb></app-docs-mongodb></section>
                <div class="h-px bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-800 to-transparent"></div>
                <section id="auth"><app-docs-auth></app-docs-auth></section>

                <div class="h-px bg-gradient-to-r from-transparent via-gray-200 dark:via-gray-800 to-transparent"></div>

                <section id="security"><app-docs-security></app-docs-security></section>
            </main>
        </div>
    </div>
</div>
