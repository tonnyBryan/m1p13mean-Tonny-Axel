<div
    class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03] overflow-hidden flex flex-col transition-all hover:shadow-sm">

    <!-- Header -->
    <div
        class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex-shrink-0">
        <div>
            <h3 class="text-base font-bold text-gray-800 dark:text-white/90">Support Requests</h3>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Latest tickets needing attention</p>
        </div>
        <a routerLink="/admin/app/support-requests"
            class="inline-flex items-center gap-1.5 px-3 py-2 text-xs font-semibold text-rose-600 dark:text-rose-400 bg-rose-50 dark:bg-rose-900/20 hover:bg-rose-100 dark:hover:bg-rose-900/30 rounded-xl transition-all duration-200">
            View all
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
        </a>
    </div>

    <!-- LIST -->
    <div *ngIf="!isLoading && requests && requests.length > 0" class="flex-1">
        <div *ngFor="let req of requests"
            class="px-6 py-4 flex items-start gap-4 border-b border-gray-50 dark:border-gray-800/50 hover:bg-gray-50 dark:hover:bg-white/[0.02] transition-colors last:border-0">
            <div
                class="flex-shrink-0 w-8 h-8 rounded-full bg-rose-50 dark:bg-rose-900/20 flex items-center justify-center text-rose-600 dark:text-rose-400">
                <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z" />
                </svg>
            </div>
            <div class="flex-1 overflow-hidden">
                <div class="flex items-center justify-between mb-0.5">
                    <p class="text-sm font-semibold text-gray-800 dark:text-white/90">{{ req.fullName || 'Guest' }}
                    </p>
                    <span class="text-[10px] text-gray-400 dark:text-gray-500">{{ formatDate(req.createdAt) }}</span>
                </div>
                <p class="text-xs text-gray-500 dark:text-gray-400 line-clamp-1 italic">"{{ req.subject }}"</p>
                <div class="mt-2 flex items-center gap-2">
                    <span
                        class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase bg-gray-100 text-gray-500 dark:bg-gray-800 dark:text-gray-400">
                        {{ req.status }}
                    </span>
                    <span *ngIf="req.priority === 'high'"
                        class="px-1.5 py-0.5 rounded text-[9px] font-bold uppercase bg-rose-50 text-rose-600 dark:bg-rose-900/30 dark:text-rose-400">
                        Urgent
                    </span>
                </div>
            </div>
        </div>
    </div>

    <!-- EMPTY -->
    <div *ngIf="!isLoading && (!requests || requests.length === 0)"
        class="flex-1 flex flex-col items-center justify-center py-12 text-center px-6">
        <p class="text-sm font-semibold text-gray-600 dark:text-gray-300">No active support requests</p>
    </div>

</div>
