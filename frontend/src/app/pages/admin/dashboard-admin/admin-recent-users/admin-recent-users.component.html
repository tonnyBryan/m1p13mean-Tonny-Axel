<div
    class="rounded-2xl border border-gray-200 bg-white dark:border-gray-800 dark:bg-white/[0.03] overflow-hidden flex flex-col transition-all hover:shadow-sm h-full">

    <!-- Header -->
    <div
        class="flex items-center justify-between px-6 py-4 border-b border-gray-100 dark:border-gray-800 flex-shrink-0">
        <div>
            <h3 class="text-base font-bold text-gray-800 dark:text-white/90">Latest Signups</h3>
            <p class="text-xs text-gray-500 dark:text-gray-400 mt-0.5">Recently registered users</p>
        </div>
        <a routerLink="/admin/app/users"
            class="inline-flex items-center gap-1.5 px-3 py-2 text-xs font-semibold text-blue-600 dark:text-blue-400 bg-blue-50 dark:bg-blue-900/20 hover:bg-blue-100 dark:hover:bg-blue-900/30 rounded-xl transition-all duration-200">
            View all
            <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M13 7l5 5m0 0l-5 5m5-5H6" />
            </svg>
        </a>
    </div>

    <!-- SKELETON -->
    <div *ngIf="isLoading" class="flex-1">
        <div *ngFor="let i of [1,2,3,4,5]"
            class="px-6 py-4 flex items-center justify-between border-b border-gray-50 dark:border-gray-800/50">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bg-gray-200 dark:bg-gray-700 animate-pulse"></div>
                <div class="space-y-2">
                    <div class="h-4 w-32 rounded-lg bg-gray-200 dark:bg-gray-700 animate-pulse"></div>
                    <div class="h-3 w-24 rounded-lg bg-gray-200 dark:bg-gray-700 animate-pulse"></div>
                </div>
            </div>
            <div class="h-6 w-16 rounded-full bg-gray-200 dark:bg-gray-700 animate-pulse"></div>
        </div>
    </div>

    <!-- LIST -->
    <div *ngIf="!isLoading && users && users.length > 0" class="flex-1">
        <div *ngFor="let user of users"
            class="px-6 py-4 flex items-center justify-between border-b border-gray-50 dark:border-gray-800/50 hover:bg-gray-50 dark:hover:bg-white/[0.02] transition-colors last:border-0">
            <div class="flex items-center gap-3 overflow-hidden">
                <div
                    class="flex-shrink-0 w-10 h-10 rounded-full bg-blue-50 dark:bg-blue-900/20 flex items-center justify-center text-blue-600 dark:text-blue-400 font-bold text-sm">
                    {{ user.name.charAt(0).toUpperCase() }}
                </div>
                <div class="overflow-hidden">
                    <p class="text-sm font-semibold text-gray-800 dark:text-white/90 truncate">
                        {{ user.name }}
                    </p>
                    <p class="text-xs text-gray-400 dark:text-gray-500 mt-0.5 truncate">{{ user.email }}</p>
                </div>
            </div>
            <div class="text-right flex-shrink-0 ml-4">
                <span
                    class="inline-flex items-center px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider bg-gray-100 text-gray-600 dark:bg-gray-800 dark:text-gray-400">
                    {{ user.role }}
                </span>
                <p class="text-[10px] text-gray-400 dark:text-gray-500 mt-1">{{ formatDate(user.createdAt) }}</p>
            </div>
        </div>
    </div>

    <!-- EMPTY -->
    <div *ngIf="!isLoading && (!users || users.length === 0)"
        class="flex-1 flex flex-col items-center justify-center py-12 text-center px-6">
        <p class="text-sm font-semibold text-gray-600 dark:text-gray-300">No users found</p>
    </div>

</div>
