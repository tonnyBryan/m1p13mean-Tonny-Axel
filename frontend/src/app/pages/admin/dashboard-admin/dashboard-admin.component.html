<div class="mx-auto max-w-7xl space-y-6">

    <div>
        <h1 class="text-2xl font-bold text-gray-800 dark:text-white/90">Admin Dashboard</h1>
        <p class="text-sm text-gray-500 dark:text-gray-400 mt-0.5">Platform overview & global statistics</p>
    </div>

    <!-- KPI SECTION -->
    <div class="flex flex-col gap-6">
        <div>
            <app-admin-kpi [stats]="realtimeData?.stats" [isLoading]="isLoading" />
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">
            <!-- Left Column: Recent Users -->
            <div class="space-y-6">
                <app-admin-recent-users [users]="realtimeData?.recentUsers" [isLoading]="isLoading" />
            </div>

            <!-- Right Column: Support & Quick Actions -->
            <div class="space-y-6">
                <app-admin-recent-support [requests]="realtimeData?.recentSupportRequests" [isLoading]="isLoading" />

                <!-- Quick Actions -->
                <div
                    class="p-6 bg-white dark:bg-gray-900 border border-gray-100 dark:border-gray-800 rounded-2xl shadow-sm">
                    <h3 class="text-lg font-semibold text-gray-800 dark:text-white mb-4">Quick Actions</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <button routerLink="/admin/app/boutiques"
                            class="flex flex-col items-center justify-center p-4 bg-primary-50 dark:bg-primary-900/20 text-primary-600 dark:text-primary-400 rounded-xl hover:bg-primary-100 dark:hover:bg-primary-900/30 transition-colors border border-primary-100 dark:border-primary-800">
                            <span class="text-2xl mb-2">🏪</span>
                            <span class="text-sm font-medium">Manage Stores</span>
                        </button>
                        <button routerLink="/admin/app/users"
                            class="flex flex-col items-center justify-center p-4 bg-blue-50 dark:bg-blue-900/20 text-blue-600 dark:text-blue-400 rounded-xl hover:bg-blue-100 dark:hover:bg-blue-900/30 transition-colors border border-blue-100 dark:border-blue-800">
                            <span class="text-2xl mb-2">👥</span>
                            <span class="text-sm font-medium">Manage Users</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>
